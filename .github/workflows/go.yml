name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Intentional failure
    - name: Force build failure
      run: |
        echo "Simulating failure"
        exit 1

    - name: Notify Robin
      if: always()
      run: |
        curl -X POST "${{ secrets.ROBIN_WEBHOOK_URL }}/webhook" \
        -H "Content-Type: application/json" \
        -d '{
          "status": "${{ job.status }}",
          "repo": "${{ github.repository }}",
          "branch": "${{ github.ref_name }}",
          "run_id": "${{ github.run_id }}"
        }'
